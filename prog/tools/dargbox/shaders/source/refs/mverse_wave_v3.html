<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PS3 Wave Shader — Orange Knot</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; }
  canvas { display: block; width: 100vw; height: 100vh; }
  /* Optional controls overlay */
  #controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 12px; z-index: 10; font-family: 'Courier New', monospace;
    background: rgba(0,0,0,0.6); border: 1px solid rgba(255,140,0,0.3);
    border-radius: 8px; padding: 10px 18px; backdrop-filter: blur(6px);
  }
  #controls label { color: rgba(255,160,40,0.7); font-size: 11px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  #controls input[type=range] { width: 90px; accent-color: #ff8c00; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="controls">
  <label>Knot X <input type="range" id="kx" min="0" max="100" value="50"></label>
  <label>Knot Y <input type="range" id="ky" min="0" max="100" value="50"></label>
  <label>Direction <input type="range" id="dir" min="0" max="360" value="0" step="1"></label>
  <label>Waves <input type="range" id="waves" min="6" max="40" value="18"></label>
  <label>Speed <input type="range" id="spd" min="10" max="200" value="80"></label>
  <label>Glow <input type="range" id="glow" min="10" max="100" value="50"></label>
</div>

<script>
const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');

/* ─── Controls ─── */
const ctrl = {
  get kx()    { return document.getElementById('kx').value / 100; },
  get ky()    { return document.getElementById('ky').value / 100; },
  get dir()   { return document.getElementById('dir').value * Math.PI / 180; },
  get waves() { return +document.getElementById('waves').value; },
  get spd()   { return document.getElementById('spd').value / 100; },
  get glow()  { return document.getElementById('glow').value / 100; },
};

/* ─── Shaders ─── */
const VS = `
attribute vec2 a_pos;
void main(){ gl_Position = vec4(a_pos, 0.0, 1.0); }
`;

// Main fragment shader — PS3-style flowing ribbons converging at a knot
const FS = `
precision highp float;

uniform vec2  u_res;
uniform float u_time;
uniform vec2  u_knot;      // knot position (0-1)
uniform float u_dir;       // flow direction angle in radians
uniform float u_waves;     // number of wave ribbons
uniform float u_speed;     // animation speed multiplier
uniform float u_glow;      // glow intensity

#define PI 3.14159265359

// Attempt a smooth pseudo-random
float hash(float n){ return fract(sin(n)*43758.5453123); }

// Smooth noise
float noise(float x){
  float i = floor(x);
  float f = fract(x);
  return mix(hash(i), hash(i+1.0), f*f*(3.0-2.0*f));
}

void main(){
  vec2 uv = gl_FragCoord.xy / u_res;
  float aspect = u_res.x / u_res.y;
  
  // Centered UV with aspect correction
  vec2 p = uv - 0.5;
  p.x *= aspect;
  
  vec2 knot = u_knot - 0.5;
  knot.x *= aspect;
  
  // Rotate coordinate system by direction angle
  float ca = cos(u_dir), sa = sin(u_dir);
  mat2 rot = mat2(ca, -sa, sa, ca);
  vec2 rp = rot * p;
  vec2 rk = rot * knot;
  
  // Primary axis along the flow direction
  float along = rp.x;   // along flow
  float perp  = rp.y;   // perpendicular
  float kAlong = rk.x;
  float kPerp  = rk.y;
  
  float t = u_time * u_speed;
  
  // Accumulate color from multiple wave ribbons
  vec3 col = vec3(0.0);
  float totalBright = 0.0;
  
  float numWaves = u_waves;
  
  for(float i = 0.0; i < 40.0; i++){
    if(i >= numWaves) break;
    
    float id = i / numWaves;
    float seed = hash(i * 17.31);
    float seed2 = hash(i * 23.71 + 7.0);
    float seed3 = hash(i * 11.13 + 3.0);
    
    // Each ribbon has a base perpendicular offset
    // They spread out far from knot, converge at knot
    float spread = (id - 0.5) * 2.0;  // -1 to 1
    spread += (seed - 0.5) * 0.6;      // randomize
    
    // Distance from knot along the flow axis
    float dAlong = along - kAlong;
    
    // Convergence factor: ribbons pinch at the knot
    // Use a smooth function that goes from wide -> narrow -> wide
    float pinch = 1.0 - exp(-1.8 * dAlong * dAlong);
    
    // Extra tight convergence near knot
    float tightPinch = exp(-8.0 * dAlong * dAlong);
    
    // Base ribbon path (perpendicular position)
    float ribbonBase = kPerp + spread * (0.15 + 0.55 * pinch);
    
    // Add flowing sine waves — multiple harmonics
    float wave = 0.0;
    float flowPhase = along * (2.5 + seed * 2.0) - t * (0.3 + seed2 * 0.4);
    wave += sin(flowPhase) * 0.04 * (0.5 + pinch);
    wave += sin(flowPhase * 2.3 + seed * 6.0 - t * 0.2) * 0.02 * (0.3 + pinch);
    wave += sin(flowPhase * 0.7 + seed3 * 4.0 + t * 0.15) * 0.03 * pinch;
    
    // Near the knot, add crossing/interweaving
    float crossFactor = tightPinch;
    float crossWave = sin(along * 8.0 + i * PI / numWaves + t * 0.5) * 0.08 * crossFactor;
    wave += crossWave;
    
    // Final ribbon center
    float ribbonY = ribbonBase + wave;
    
    // Distance from pixel to this ribbon
    float d = abs(perp - ribbonY);
    
    // Ribbon thickness — thinner far from knot, slight thickening at knot
    float thickness = 0.0018 + 0.001 * tightPinch;
    
    // Core sharp line
    float core = smoothstep(thickness, 0.0, d);
    
    // Glow around the ribbon
    float glowRadius = (0.008 + 0.015 * u_glow) * (1.0 + 1.5 * tightPinch);
    float ribbonGlow = exp(-d * d / (glowRadius * glowRadius));
    
    // Color: orange-gold palette with variation per ribbon
    // Range from deep orange to golden amber
    vec3 baseColor;
    float hueShift = seed * 0.3;
    baseColor.r = 1.0;
    baseColor.g = 0.35 + hueShift * 0.4 + 0.15 * tightPinch;
    baseColor.b = 0.02 + seed2 * 0.08;
    
    // Brighter at the knot
    float knotBrightness = 1.0 + 2.0 * tightPinch;
    
    // Pulsing particles along ribbons (dotted appearance)
    float particleFreq = 30.0 + seed * 20.0;
    float particlePhase = along * particleFreq - t * (2.0 + seed * 3.0);
    float particles = 0.5 + 0.5 * sin(particlePhase);
    particles = pow(particles, 3.0);  // sharpen into dots
    float particleIntensity = 0.3 + 0.7 * particles;
    
    // Small rectangular "node" highlights along ribbons (like the image)
    float nodeFreq = 4.0 + seed * 3.0;
    float nodePhase = along * nodeFreq - t * (0.1 + seed2 * 0.15);
    float node = smoothstep(0.92, 0.96, sin(nodePhase));
    float nodeGlow = node * exp(-d * d / (0.0003 + 0.001 * u_glow));
    
    // Combine
    float intensity = (core * 1.5 + ribbonGlow * 0.6) * knotBrightness * particleIntensity;
    intensity += nodeGlow * 2.0;
    
    col += baseColor * intensity;
    totalBright += intensity;
  }
  
  // Add central knot bloom
  float knotDist = length(vec2(along - kAlong, perp - kPerp));
  float knotBloom = exp(-knotDist * knotDist / (0.003 * u_glow + 0.001));
  vec3 knotColor = vec3(1.0, 0.7, 0.2) * knotBloom * 0.8;
  col += knotColor;
  
  // Secondary subtle knot bloom (wider, dimmer)
  float knotBloom2 = exp(-knotDist * knotDist / (0.02 * u_glow + 0.005));
  col += vec3(0.6, 0.25, 0.02) * knotBloom2 * 0.3;
  
  // Very subtle background stars
  vec2 starUV = gl_FragCoord.xy * 0.01;
  float star = hash(floor(starUV.x * 100.0) + floor(starUV.y * 100.0) * 317.0);
  star = pow(star, 20.0) * 0.15;
  col += vec3(star * 0.7, star * 0.8, star);
  
  // Subtle vignette
  float vig = 1.0 - 0.4 * length(uv - 0.5);
  col *= vig;
  
  // Tone mapping (soft)
  col = 1.0 - exp(-col * 1.5);
  
  // Slight color grade — push blacks toward deep blue
  col += vec3(-0.01, -0.005, 0.015) * (1.0 - col);
  
  gl_FragColor = vec4(col, 1.0);
}
`;

/* ─── WebGL Setup ─── */
function createShader(type, src){
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)){
    console.error(gl.getShaderInfoLog(s));
    return null;
  }
  return s;
}

const vs = createShader(gl.VERTEX_SHADER, VS);
const fs = createShader(gl.FRAGMENT_SHADER, FS);
const prog = gl.createProgram();
gl.attachShader(prog, vs);
gl.attachShader(prog, fs);
gl.linkProgram(prog);
gl.useProgram(prog);

// Full-screen quad
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

// Uniforms
const uRes   = gl.getUniformLocation(prog, 'u_res');
const uTime  = gl.getUniformLocation(prog, 'u_time');
const uKnot  = gl.getUniformLocation(prog, 'u_knot');
const uDir   = gl.getUniformLocation(prog, 'u_dir');
const uWaves = gl.getUniformLocation(prog, 'u_waves');
const uSpeed = gl.getUniformLocation(prog, 'u_speed');
const uGlow  = gl.getUniformLocation(prog, 'u_glow');

function resize(){
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  gl.viewport(0, 0, canvas.width, canvas.height);
}
window.addEventListener('resize', resize);
resize();

/* ─── Render Loop ─── */
const start = performance.now();
function frame(){
  const t = (performance.now() - start) / 1000;
  
  gl.uniform2f(uRes, canvas.width, canvas.height);
  gl.uniform1f(uTime, t);
  gl.uniform2f(uKnot, ctrl.kx, ctrl.ky);
  gl.uniform1f(uDir, ctrl.dir);
  gl.uniform1f(uWaves, ctrl.waves);
  gl.uniform1f(uSpeed, ctrl.spd);
  gl.uniform1f(uGlow, ctrl.glow);
  
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
