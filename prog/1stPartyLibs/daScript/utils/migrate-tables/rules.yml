# === Free function reversed (commutative) ===
---
id: free-insert-add-reversed
language: daslang
rule:
  pattern:
    context: 'def _() { insert(#A, #B, #C + get_value(#A, #B)) }'
    selector: expression_statement
fix: '$A[$B] += $C'
